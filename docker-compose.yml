version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eresumeier-postgres
    environment:
      POSTGRES_DB: eresumeier
      POSTGRES_USER: eresumeier_user
      POSTGRES_PASSWORD: eresumeier_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eresumeier_user -d eresumeier"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eresumeier-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
